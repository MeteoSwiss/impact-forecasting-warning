name: CI_test

on:
  pull_request:
    branches: '**'
  push:
    branches: ['main']
  workflow_call:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # Python version is now controlled by environment.yml (3.11)
    # If you need to test multiple versions, create multiple environment files


    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4

    - name: Setup Micromamba
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-file: environment.yml
        environment-name: climada_env
        cache-environment: true
        init-shell: bash

    - name: Install poetry
      run: |
        pip install poetry
      shell: micromamba-shell {0}

    - name: Install dependencies
      run: poetry install
      shell: micromamba-shell {0}

    - name: Build documentation
      run: poetry run sphinx-build doc doc/_build
      shell: micromamba-shell {0}

    - name: Run pytest
      run: poetry run pytest -s --cov=impact_forecasting_warning --cov-fail-under=0
      shell: micromamba-shell {0}

    - name: Run linter
      run: |
        OUTPUT=$(poetry run pylint -rn --output-format=parseable impact_forecasting_warning 2>&1 || true)
        echo "$OUTPUT"
        
        # Extract the score from pylint output
        SCORE=$(echo "$OUTPUT" | grep -Po 'rated at \K[0-9.]+(?=/10)' || echo 0)
        echo "Pylint score: $SCORE/10"
        
        # Allow pylint to pass with a low threshold (adjust as needed)
        MIN_SCORE=5.0
        if (( $(echo "$SCORE < $MIN_SCORE" | bc -l) )); then
          echo "Warning: Pylint score $SCORE is below minimum $MIN_SCORE"
          # Uncomment next line to make it fail: exit 1
        fi
      shell: micromamba-shell {0}

    - name: Run static checker
      run: |
        OUTPUT=$(poetry run mypy impact_forecasting_warning 2>&1 || true)
        echo "$OUTPUT"

        # Extract the error count from lines
        COUNT=$(echo "$OUTPUT" | grep -Po 'Found \K[0-9]+(?= errors?)' || echo 0)
        echo "Found $COUNT mypy errors"

        MAX_ERRORS=20
        if [ "$COUNT" -gt "$MAX_ERRORS" ]; then
          echo "$COUNT/$MAX_ERRORS mypy errors found."
          exit 1
        else
          exit 0
        fi
      shell: micromamba-shell {0}
